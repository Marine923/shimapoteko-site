<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="調理済み（仮画像）">
  <defs>
    <radialGradient id="bgK" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2a2220"/>
      <stop offset="100%" stop-color="#0f0a08"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#e8dfc7"/>
      <stop offset="75%" stop-color="#c5b78f"/>
      <stop offset="100%" stop-color="#8a7c56"/>
    </radialGradient>
    <radialGradient id="tFry" cx="32%" cy="26%" r="78%">
      <stop offset="0%" stop-color="#fde7a8"/>
      <stop offset="35%" stop-color="#e8bd5f"/>
      <stop offset="80%" stop-color="#b0802a"/>
      <stop offset="100%" stop-color="#6e4b10"/>
    </radialGradient>
    <filter id="sK" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bgK)"/>

  <!-- plate shadow -->
  <ellipse cx="200" cy="300" rx="160" ry="30" fill="#000000" opacity="0.6" filter="url(#sK)"/>
  <!-- plate -->
  <ellipse cx="200" cy="210" rx="170" ry="130" fill="url(#plate)"/>
  <ellipse cx="200" cy="210" rx="140" ry="105" fill="none" stroke="#8a7c56" stroke-width="1.2" opacity="0.4"/>

  <!-- cooked potatoes (fried golden) -->
  <g transform="translate(150 200) rotate(-14)">
    <ellipse rx="48" ry="36" fill="url(#tFry)"/>
    <ellipse rx="24" ry="16" cx="-12" cy="-14" fill="#fdf0c9" opacity="0.5"/>
    <circle cx="10" cy="-4" r="1.2" fill="#6e3e0e" opacity="0.6"/>
  </g>
  <g transform="translate(230 175) rotate(20)">
    <ellipse rx="52" ry="40" fill="url(#tFry)"/>
    <ellipse rx="26" ry="18" cx="-14" cy="-16" fill="#fdf0c9" opacity="0.5"/>
    <circle cx="12" cy="-6" r="1.4" fill="#6e3e0e" opacity="0.6"/>
  </g>
  <g transform="translate(260 245) rotate(-10)">
    <ellipse rx="46" ry="35" fill="url(#tFry)"/>
    <ellipse rx="22" ry="15" cx="-10" cy="-14" fill="#fdf0c9" opacity="0.5"/>
    <circle cx="8" cy="-4" r="1.2" fill="#6e3e0e" opacity="0.55"/>
  </g>
  <g transform="translate(155 255) rotate(15)">
    <ellipse rx="44" ry="34" fill="url(#tFry)"/>
    <ellipse rx="22" ry="15" cx="-10" cy="-14" fill="#fdf0c9" opacity="0.5"/>
    <circle cx="8" cy="-4" r="1.2" fill="#6e3e0e" opacity="0.55"/>
  </g>
  <g transform="translate(205 220) rotate(6)">
    <ellipse rx="38" ry="28" fill="url(#tFry)"/>
    <ellipse rx="18" ry="12" cx="-8" cy="-10" fill="#fdf0c9" opacity="0.5"/>
  </g>

  <!-- salt sprinkles -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="140" cy="170" r="1.5"/>
    <circle cx="180" cy="165" r="1.2"/>
    <circle cx="210" cy="150" r="1.4"/>
    <circle cx="245" cy="160" r="1.2"/>
    <circle cx="170" cy="200" r="1"/>
    <circle cx="220" cy="210" r="1.3"/>
    <circle cx="260" cy="215" r="1"/>
    <circle cx="175" cy="250" r="1.2"/>
    <circle cx="230" cy="265" r="1"/>
    <circle cx="265" cy="190" r="1.1"/>
  </g>

  <!-- herb sprig garnish -->
  <g transform="translate(95 170) rotate(-30)" fill="#7a8b4a">
    <path d="M 0 0 Q 15 -2 30 -6" stroke="#5b6b36" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse rx="4" ry="1.8" cx="10" cy="-3"/>
    <ellipse rx="4" ry="1.8" cx="22" cy="-6"/>
  </g>
</svg>
