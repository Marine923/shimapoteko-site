<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="島ポテこ 壱岐の赤土から届く、ちいさな黄金">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d3d26"/>
      <stop offset="0.55" stop-color="#a4583a"/>
      <stop offset="1" stop-color="#5f2e1b"/>
    </linearGradient>
    <radialGradient id="og-pot" cx="0.3" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ffe3a3"/>
      <stop offset="0.5" stop-color="#d9be8d"/>
      <stop offset="1" stop-color="#8a5f2a"/>
    </radialGradient>
    <filter id="og-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="og-linen" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 0 4 L 8 4" stroke="#fff" stroke-width="0.5" opacity="0.05"/>
      <path d="M 4 0 L 4 8" stroke="#fff" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-linen)"/>
  <!-- decorative dust -->
  <g fill="#ffe3a3" opacity="0.15">
    <circle cx="80" cy="90" r="2"/>
    <circle cx="180" cy="50" r="1.5"/>
    <circle cx="1080" cy="80" r="2"/>
    <circle cx="1140" cy="150" r="1.5"/>
    <circle cx="60" cy="560" r="2"/>
    <circle cx="1120" cy="540" r="2"/>
  </g>
  <!-- potatoes cluster (right side) -->
  <g transform="translate(820, 300)">
    <ellipse cx="10" cy="130" rx="220" ry="20" fill="#000" opacity="0.35" filter="url(#og-shadow)"/>
    <ellipse cx="-110" cy="40" rx="80" ry="62" fill="url(#og-pot)"/>
    <ellipse cx="0" cy="0" rx="100" ry="78" fill="url(#og-pot)"/>
    <ellipse cx="110" cy="45" rx="80" ry="62" fill="url(#og-pot)"/>
    <ellipse cx="-60" cy="100" rx="72" ry="56" fill="url(#og-pot)"/>
    <ellipse cx="60" cy="105" rx="72" ry="56" fill="url(#og-pot)"/>
    <!-- highlights -->
    <ellipse cx="-120" cy="20" rx="14" ry="8" fill="#fff" opacity="0.4"/>
    <ellipse cx="-12" cy="-22" rx="18" ry="10" fill="#fff" opacity="0.4"/>
    <ellipse cx="100" cy="25" rx="14" ry="8" fill="#fff" opacity="0.4"/>
  </g>
  <!-- brand mark (square with 島) -->
  <g transform="translate(90, 90)">
    <rect width="96" height="96" rx="8" fill="#f7f1e3"/>
    <rect x="4" y="4" width="88" height="88" rx="5" fill="none" stroke="#2a2220" stroke-width="2"/>
    <text x="48" y="72" font-family="'Shippori Mincho', 'Yu Mincho', serif" font-size="62" text-anchor="middle" fill="#a4583a" font-weight="700">島</text>
  </g>
  <!-- brand name -->
  <g transform="translate(220, 115)">
    <text x="0" y="0" font-family="'Shippori Mincho', 'Yu Mincho', serif" font-size="54" fill="#f7f1e3" font-weight="700">島ポテこ</text>
    <text x="0" y="40" font-family="sans-serif" font-size="18" fill="#d9be8d" letter-spacing="8">SHIMA POTEKO</text>
  </g>
  <!-- main headline -->
  <g transform="translate(90, 300)">
    <text x="0" y="0" font-family="'Shippori Mincho', 'Yu Mincho', serif" font-size="74" fill="#f7f1e3" font-weight="700">壱岐の赤土から届く、</text>
    <text x="0" y="95" font-family="'Shippori Mincho', 'Yu Mincho', serif" font-size="74" fill="#d9be8d" font-weight="700">ちいさな黄金。</text>
  </g>
  <!-- subline -->
  <g transform="translate(90, 495)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d9be8d" stroke-width="1.5"/>
    <text x="78" y="6" font-family="sans-serif" font-size="22" fill="#f7f1e3" opacity="0.9">玄界灘の小島で育つ、小粒の新じゃが。</text>
    <text x="78" y="42" font-family="sans-serif" font-size="22" fill="#f7f1e3" opacity="0.9">2026年6月、長崎県壱岐市から初出荷。</text>
  </g>
  <!-- bottom domain -->
  <text x="90" y="585" font-family="sans-serif" font-size="16" fill="#d9be8d" letter-spacing="3" opacity="0.8">SHIMAPOTEKO.COM  ·  壱岐島 湯ノ本エリア</text>
</svg>
