<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="新じゃが 断面（仮画像）">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#2f1b0e"/>
    </linearGradient>
    <radialGradient id="tSkin" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f4d99b"/>
      <stop offset="40%" stop-color="#d7ae6b"/>
      <stop offset="100%" stop-color="#8a6634"/>
    </radialGradient>
    <radialGradient id="tFlesh" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fdf0c9"/>
      <stop offset="60%" stop-color="#f3dfa0"/>
      <stop offset="100%" stop-color="#d6bd76"/>
    </radialGradient>
    <filter id="sC" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#bgC)"/>
  <!-- wood grain -->
  <g opacity="0.18" stroke="#1a0d07" stroke-width="0.8" fill="none">
    <path d="M 0 60 Q 200 66 400 58"/>
    <path d="M 0 140 Q 200 146 400 138"/>
    <path d="M 0 220 Q 200 216 400 226"/>
    <path d="M 0 300 Q 200 306 400 298"/>
    <path d="M 0 370 Q 200 366 400 376"/>
  </g>
  <!-- shadow -->
  <ellipse cx="200" cy="300" rx="140" ry="22" fill="#0a0502" opacity="0.6" filter="url(#sC)"/>

  <!-- half potato (left) — whole back -->
  <g transform="translate(130 220) rotate(-8)">
    <ellipse rx="90" ry="72" fill="url(#tSkin)"/>
    <ellipse rx="44" ry="28" cx="-22" cy="-26" fill="#fbe9bd" opacity="0.4"/>
    <circle cx="12" cy="-10" r="2" fill="#6b4422" opacity="0.7"/>
    <circle cx="-18" cy="16" r="1.8" fill="#6b4422" opacity="0.6"/>
  </g>

  <!-- half potato (right) — cut face showing flesh -->
  <g transform="translate(270 215) rotate(8)">
    <!-- skin rim -->
    <ellipse rx="92" ry="74" fill="url(#tSkin)"/>
    <!-- cut flesh -->
    <ellipse rx="78" ry="62" fill="url(#tFlesh)"/>
    <!-- flesh rings -->
    <ellipse rx="70" ry="55" fill="none" stroke="#e8cf88" stroke-width="1" opacity="0.5"/>
    <ellipse rx="54" ry="42" fill="none" stroke="#e8cf88" stroke-width="0.8" opacity="0.35"/>
    <!-- moisture highlight -->
    <ellipse rx="30" ry="18" cx="-18" cy="-20" fill="#ffffff" opacity="0.22"/>
  </g>
</svg>
